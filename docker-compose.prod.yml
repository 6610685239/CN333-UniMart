# Production deployment with Nginx reverse proxy
services:
  backend:
    image: ${DOCKER_IMAGE_BACKEND:-unimart-backend:latest}
    env_file: .env.production
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${DOCKER_IMAGE_FRONTEND:-unimart-frontend:latest}
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    restart: always
